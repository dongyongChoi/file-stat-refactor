name: file-stat-refactor

services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: file-stat-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle1234
      APP_USER: FILE_STAT
      APP_USER_PASSWORD: FileStat1234
      TZ: Asia/Seoul
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  oracle-data:
    name: file-stat-oracle-data
